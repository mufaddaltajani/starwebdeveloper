name: starwebdeveloper

services:
  # The Web Server
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # The Application Engine (PHP 8.3)
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    # Ensure PHP container has permissions to write to the SQLite file
    user: "1000:1000"

  # The In-Memory Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
